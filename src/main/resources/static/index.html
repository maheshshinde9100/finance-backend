<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Records Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .auth-section, .app-section {
            display: none;
        }
        
        .auth-section.active, .app-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-left: 10px;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 15px 30px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .record-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .record-card.income {
            border-left-color: #28a745;
        }
        
        .record-card.expense {
            border-left-color: #dc3545;
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .record-amount {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .record-amount.income {
            color: #28a745;
        }
        
        .record-amount.expense {
            color: #dc3545;
        }
        
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .user-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Financial Records Manager</h1>
            <p>Track your income and expenses efficiently</p>
        </div>
        
        <div class="content">
            <div id="message"></div>
            
            <!-- Authentication Section -->
            <div class="auth-section active" id="authSection">
                <div class="tabs">
                    <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="tab" onclick="switchAuthTab('signup')">Sign Up</button>
                </div>
                
                <div class="tab-content active" id="loginTab">
                    <h2>Login to Your Account</h2>
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="loginUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
                
                <div class="tab-content" id="signupTab">
                    <h2>Create New Account</h2>
                    <form id="signupForm" onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="signupUsername" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="signupEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="signupPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </form>
                </div>
            </div>
            
            <!-- Application Section -->
            <div class="app-section" id="appSection">
                <div class="user-info">
                    <strong>Welcome, <span id="currentUser"></span>!</strong>
                    <button class="btn btn-secondary" onclick="handleLogout()" style="float: right;">Logout</button>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchAppTab('dashboard')">Dashboard</button>
                    <button class="tab" onclick="switchAppTab('records')">Records</button>
                    <button class="tab" onclick="switchAppTab('add')">Add Record</button>
                </div>
                
                <!-- Dashboard Tab -->
                <div class="tab-content active" id="dashboardTab">
                    <h2>Dashboard Summary</h2>
                    <div class="dashboard-stats" id="dashboardStats"></div>
                </div>
                
                <!-- Records Tab -->
                <div class="tab-content" id="recordsTab">
                    <h2>Financial Records</h2>
                    
                    <div class="filter-section">
                        <h3>Filter Records</h3>
                        <div class="filter-row">
                            <div class="form-group">
                                <label>Type</label>
                                <select id="filterType">
                                    <option value="">All</option>
                                    <option value="INCOME">Income</option>
                                    <option value="EXPENSE">Expense</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <input type="text" id="filterCategory" placeholder="e.g., Salary, Food">
                            </div>
                            <div class="form-group">
                                <label>Start Date</label>
                                <input type="date" id="filterStartDate">
                            </div>
                            <div class="form-group">
                                <label>End Date</label>
                                <input type="date" id="filterEndDate">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                        <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
                    </div>
                    
                    <div id="recordsList"></div>
                </div>
                
                <!-- Add Record Tab -->
                <div class="tab-content" id="addTab">
                    <h2>Add New Record</h2>
                    <form id="recordForm" onsubmit="handleAddRecord(event)">
                        <div class="form-group">
                            <label>Type</label>
                            <select id="recordType" required>
                                <option value="">Select Type</option>
                                <option value="INCOME">Income</option>
                                <option value="EXPENSE">Expense</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" id="recordCategory" required placeholder="e.g., Salary, Food, Rent">
                        </div>
                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" id="recordAmount" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="recordDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="recordDate" required>
                        </div>
                        <button type="submit" class="btn btn-success">Add Record</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
